name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lecture1/mini_sns/package-lock.json

      - name: Install mini_sns dependencies
        working-directory: lecture1/mini_sns
        run: npm ci

      - name: Build mini_sns
        working-directory: lecture1/mini_sns
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          NODE_ENV: production
        run: npm run build

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          # 루트 index.html 복사
          cp index.html _site/index.html
          # mini_sns 빌드 결과물을 mini-sns/ 디렉토리로 복사
          cp -r lecture1/mini_sns/dist _site/mini-sns

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
