<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="48" fill="url(#bg2)"/>

  <!-- 좌측 타이틀 영역 -->
  <text x="88" y="180" fill="white" font-family="Inter, Pretendard, Arial, sans-serif" font-size="56" font-weight="800">Mini SNS</text>
  <text x="88" y="228" fill="#BFDBFE" font-family="Inter, Pretendard, Arial, sans-serif" font-size="26" font-weight="500">작업 기록과 스터디 모임을 공유하는</text>
  <text x="88" y="264" fill="#BFDBFE" font-family="Inter, Pretendard, Arial, sans-serif" font-size="26" font-weight="500">모바일 소셜 앱</text>

  <rect x="88" y="308" width="150" height="44" rx="22" fill="white" fill-opacity="0.14"/>
  <text x="114" y="337" fill="white" font-family="Inter, Pretendard, Arial, sans-serif" font-size="18" font-weight="700">홈 피드</text>
  <rect x="252" y="308" width="120" height="44" rx="22" fill="white" fill-opacity="0.14"/>
  <text x="278" y="337" fill="white" font-family="Inter, Pretendard, Arial, sans-serif" font-size="18" font-weight="700">모임</text>
  <rect x="386" y="308" width="120" height="44" rx="22" fill="white" fill-opacity="0.14"/>
  <text x="412" y="337" fill="white" font-family="Inter, Pretendard, Arial, sans-serif" font-size="18" font-weight="700">채팅</text>
  <rect x="520" y="308" width="120" height="44" rx="22" fill="white" fill-opacity="0.14"/>
  <text x="546" y="337" fill="white" font-family="Inter, Pretendard, Arial, sans-serif" font-size="18" font-weight="700">알림</text>

  <!-- 하단 보조 문구 -->
  <text x="88" y="700" fill="#93C5FD" font-family="Inter, Pretendard, Arial, sans-serif" font-size="20" font-weight="600">React · Vite · MUI · Mock Data</text>
  <text x="88" y="732" fill="#60A5FA" font-family="Inter, Pretendard, Arial, sans-serif" font-size="18" font-weight="500">하단 탭 내비게이션 · 모임 참가 후 채팅방 이동 · 이미지 확대 모달</text>

  <!-- 우측 모바일 앱 프레임 -->
  <g filter="url(#shadow2)">
    <rect x="760" y="90" width="340" height="640" rx="46" fill="#0B1220"/>
    <rect x="778" y="118" width="304" height="584" rx="30" fill="#F8FAFC"/>
  </g>

  <!-- 상단 바 -->
  <rect x="778" y="118" width="304" height="56" rx="14" fill="#FFFFFF"/>
  <circle cx="806" cy="146" r="12" fill="#2563EB"/>
  <text x="826" y="152" fill="#0F172A" font-family="Inter, Pretendard, Arial, sans-serif" font-size="16" font-weight="800">Mini SNS</text>
  <circle cx="1054" cy="146" r="11" fill="#FEE2E2"/>

  <!-- 홈 피드 카드 -->
  <rect x="794" y="190" width="272" height="150" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="820" cy="216" r="14" fill="url(#cardBlue)"/>
  <rect x="844" y="208" width="90" height="10" rx="5" fill="#CBD5E1"/>
  <rect x="844" y="224" width="60" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="810" y="248" width="240" height="66" rx="12" fill="url(#cardBlue)" opacity="0.16"/>
  <rect x="810" y="322" width="150" height="10" rx="5" fill="#CBD5E1"/>

  <!-- 스터디 카드 -->
  <rect x="794" y="356" width="272" height="120" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="820" cy="382" r="14" fill="url(#cardTeal)"/>
  <rect x="844" y="374" width="100" height="10" rx="5" fill="#CBD5E1"/>
  <rect x="810" y="404" width="240" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="810" y="422" width="180" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="810" y="444" width="90" height="22" rx="11" fill="#0D9488"/>

  <!-- 채팅 미리보기 -->
  <rect x="794" y="492" width="272" height="80" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="820" cy="518" r="13" fill="#818CF8"/>
  <rect x="844" y="510" width="80" height="9" rx="4.5" fill="#CBD5E1"/>
  <rect x="810" y="536" width="200" height="9" rx="4.5" fill="#E2E8F0"/>

  <!-- 하단 탭 -->
  <rect x="778" y="646" width="304" height="56" rx="14" fill="#FFFFFF"/>
  <circle cx="812" cy="674" r="8" fill="#2563EB"/>
  <circle cx="856" cy="674" r="8" fill="#CBD5E1"/>
  <circle cx="1004" cy="674" r="8" fill="#CBD5E1"/>
  <circle cx="1048" cy="674" r="8" fill="#CBD5E1"/>
  <circle cx="930" cy="674" r="20" fill="#2563EB"/>
  <path d="M930 664v20M920 674h20" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
