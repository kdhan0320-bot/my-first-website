<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/my-first-website/my-portfolio/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="사용자 흐름과 정보 구조를 정리하고, Figma 설계와 React/MUI 구현으로 연결한 김도한의 UX/UI·웹퍼블리싱 포트폴리오입니다." />
    <title>김도한 | 웹퍼블리셔 포트폴리오</title>
    <!-- 다크모드 초기 깜빡임 방지: React 렌더링 전에 테마 적용 -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('portfolio-theme-mode');
          if (m !== 'dark' && m !== 'light') {
            m = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-color-scheme', m);
          document.documentElement.style.colorScheme = m;
          if (m === 'dark') {
            document.documentElement.style.background = '#0F172A';
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
