name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies (mini_sns)
        working-directory: lecture1/mini_sns
        run: npm install

      - name: Build mini_sns
        working-directory: lecture1/mini_sns
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NODE_ENV: production
        run: npm run build

      - name: Install dependencies (my-portfolio)
        working-directory: lecture1/my-portfolio
        run: npm install

      - name: Build my-portfolio
        working-directory: lecture1/my-portfolio
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install dependencies (my-community)
        working-directory: lecture1/my-community
        run: npm install

      - name: Build my-community
        working-directory: lecture1/my-community
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install dependencies (jobflow-dashboard)
        working-directory: lecture1/jobflow-dashboard
        run: npm install

      - name: Build jobflow-dashboard
        working-directory: lecture1/jobflow-dashboard
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NODE_ENV: production
        run: npm run build

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -r lecture1/mini_sns/dist/. _site/mini-sns
          cp _site/mini-sns/index.html _site/mini-sns/404.html
          cp -r lecture1/my-portfolio/dist/. _site/my-portfolio
          cp _site/my-portfolio/index.html _site/my-portfolio/404.html
          cp -r lecture1/my-community/dist/. _site/my-community
          cp _site/my-community/index.html _site/my-community/404.html
          cp -r lecture1/jobflow-dashboard/dist/. _site/jobflow-dashboard
          cp _site/jobflow-dashboard/index.html _site/jobflow-dashboard/404.html
          mkdir -p _site/ott-service
          cp -r "lecture1/OTT Service/." _site/ott-service

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
