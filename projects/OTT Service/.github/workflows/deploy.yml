# .github/workflows/deploy.yml
#
# STREAMIX OTT 서비스 — GitHub Pages 자동 배포
#
# [사용 방법]
# 1. GitHub 저장소 생성 후 이 프로젝트를 push
# 2. 저장소 Settings → Pages → Source 를 "GitHub Actions" 로 변경
# 3. main 브랜치에 push 하면 자동 배포 시작
# 4. 배포 완료 후 주소: https://<username>.github.io/<repository>/
#
# [수동 실행]
# Actions 탭 → Deploy to GitHub Pages → Run workflow

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # main 브랜치 push 시 자동 배포
  workflow_dispatch: # 수동 실행 허용

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 허용 (중복 방지)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 소스 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. GitHub Pages 설정
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 3. 정적 파일 아티팩트 업로드
      #    path: '.' → 저장소 루트 전체를 배포 대상으로 설정
      #    index.html 이 루트에 있으면 그대로 사용 가능
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # 4. GitHub Pages 배포
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
