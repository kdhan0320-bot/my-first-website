<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 12px; }
    p { font-size: 16px; color: #666; line-height: 1.7; margin-bottom: 24px; }
    .badge { display: inline-block; background: #6c63ff; color: white; padding: 8px 20px; border-radius: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요!</h1>
    <p>저의 첫 번째 웹사이트에 오신 것을 환영합니다.<br>GitHub Pages로 배포된 페이지입니다.</p>
    <span class="badge">🚀 GitHub Pages로 배포됨</span>
  </div>
</body>
</html>
